  1. Known Limitations section, item 1 — keyword search one_liner-only shortcut.
     Fix: add instruction to offer body-text search when one_liner search returns
     no results (at cost of reading all active .md files).
  2. Known Limitations section, item 3 — O(N) file scan per result on frontmatter
